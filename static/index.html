<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake-on-LAN Controller</title>
    <meta name="description" content="A premium Wake-on-LAN tool to power on your devices remotely.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22em%22 font-size=%2280%22>⚡</text></svg>">
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container">
        <header class="glass-header">
            <div class="header-content" style="flex: 1;">
                <h1>Wake-on-LAN</h1>
                <p>Remotely awaken your devices in style.</p>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;"
                    title="Master Monitoring Toggle (All Devices)">
                    <span style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 500;">Monitoring
                        (All)</span>
                    <label class="switch">
                        <input type="checkbox" id="master-ping-enabled" checked>
                        <span class="slider round success-toggle"></span>
                    </label>
                </div>
                <button class="btn btn-icon outline-btn" id="toggle-form-btn" title="Add Host">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14m-7-7h14" />
                    </svg>
                </button>
            </div>
        </header>

        <main>
            <section class="hosts-grid" id="hosts-container">
                <!-- Host cards will be dynamically injected here -->
                <div class="empty-state">Loading hosts...</div>
            </section>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <section class="add-host-panel glass-panel" id="add-host-panel">
            <div class="panel-header">
                <h2 id="modal-title">Add New Host</h2>
                <button class="close-btn" id="close-form-btn">&times;</button>
            </div>
            <form id="add-host-form">
                <div class="input-group">
                    <label for="host-name">Name</label>
                    <input type="text" id="host-name" placeholder="e.g. Workstation Alpha" required>
                </div>
                <div class="input-group">
                    <label for="host-mac">MAC Address</label>
                    <input type="text" id="host-mac" placeholder="00:11:22:33:44:55" required
                        pattern="^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$|^([0-9A-Fa-f]{12})$"
                        title="Enter a valid MAC address">
                </div>
                <div class="input-group">
                    <label for="host-ip">Broadcast IP (Optional)</label>
                    <input type="text" id="host-ip" placeholder="255.255.255.255">
                </div>
                <div class="input-group">
                    <label for="host-ping-ip">Host IP (For Ping Check, Optional)</label>
                    <input type="text" id="host-ping-ip" placeholder="192.168.1.100">
                </div>
                <div class="input-group">
                    <label for="host-access-url">Access URL (Optional)</label>
                    <input type="text" id="host-access-url" placeholder="https://my-nas.local:8080">
                </div>
                <div class="input-group"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label for="host-ping-enabled" style="margin-bottom: 0;">Enable Monitoring (Ping)</label>
                    <label class="switch">
                        <input type="checkbox" id="host-ping-enabled" checked>
                        <span class="slider round success-toggle"></span>
                    </label>
                </div>
                <button type="submit" class="btn primary-btn w-full">Save Host</button>
            </form>
        </section>
    </div>

    <!-- Login Modal Overlay -->
    <div class="modal-overlay hidden" id="login-modal-overlay" style="z-index: 2000;">
        <section class="add-host-panel glass-panel" id="login-panel" style="max-width: 400px; margin: 15% auto;">
            <div class="panel-header">
                <h2>Login</h2>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn primary-btn w-full">Login</button>
            </form>
        </section>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
